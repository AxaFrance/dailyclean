apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{name}}
spec:
  concurrencyPolicy: Forbid
  schedule: '{{schedule}}'
  timeZone: '{{timeZone}}'
  suspend: '{{suspend}}'
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: dailyclean
              image: '{{imgName}}'
              args:
                - {{argument}}
              resources:
                limits:
                  memory: "96Mi"
                requests:
                  cpu: "33m"
                  memory: "96Mi"
              env:
                - name: CURRENT_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          serviceAccountName: {{serviceAccountName}}